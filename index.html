<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Realm of ELA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
/* ═══════════════════════════════════════
   REALM OF ELA  —  Design System
═══════════════════════════════════════ */
:root {
  --purple:       #7C3AED;
  --purple-light: #A78BFA;
  --purple-dark:  #5B21B6;
  --teal:         #0891B2;
  --teal-light:   #38BDF8;
  --teal-dark:    #0E7490;
  --gold:         #F59E0B;
  --gold-light:   #FCD34D;
  --gold-dark:    #D97706;
  --red:          #EF4444;
  --text-dark:    #1a0533;
  --text-mid:     #4a3060;
  --text-light:   #7c5c9a;
  --card-radius:  24px;
  --font-display: 'Cinzel', Georgia, serif;
  --font-body:    'Nunito', Arial, sans-serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: var(--font-body);
  background: linear-gradient(145deg, #5B21B6 0%, #4338CA 30%, #0E7490 70%, #06B6D4 100%);
  background-attachment: fixed;
  min-height: 100vh;
  color: var(--text-dark);
  overflow-x: hidden;
}
button { cursor: pointer; font-family: var(--font-body); border: none; background: none; }
input  { font-family: var(--font-body); }
#root  { min-height: 100vh; position: relative; }

/* Stars */
.stars-bg { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
.star { position: absolute; color: rgba(255,255,255,0.7); animation: twinkle 3s ease-in-out infinite; }
@keyframes twinkle { 0%,100%{opacity:.25;transform:scale(.7)} 50%{opacity:1;transform:scale(1.3)} }

/* Screens */
.screen {
  position: relative; z-index: 1; min-height: 100vh;
  display: flex; flex-direction: column; align-items: center;
  padding: 24px 16px 40px;
}
.enter { animation: fadeUp .4s ease both; }
@keyframes fadeUp { from{opacity:0;transform:translateY(18px)} to{opacity:1;transform:translateY(0)} }
.shake { animation: shake .5s ease; }
@keyframes shake { 0%,100%{transform:translateX(0)} 20%,60%{transform:translateX(-8px)} 40%,80%{transform:translateX(8px)} }

/* ── CLASS CODE ── */
.screen-center { justify-content: center; }
.gems-bg { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
.gem-float { position: absolute; font-size: 30px; animation: gfloat 6s ease-in-out infinite; }
@keyframes gfloat { 0%,100%{transform:translateY(0) rotate(0)} 50%{transform:translateY(-22px) rotate(15deg)} }

.login-card {
  background: rgba(255,255,255,.8);
  border: 1.5px solid #C4B5FD;
  border-radius: 12px;
  box-shadow: 0 4px 16px rgba(0,0,0,.1);
  padding: 40px 36px;
  width: 100%; max-width: 440px;
  text-align: center;
  position: relative; z-index: 1;
}
.logo-icon {
  font-size: 58px; display: block; margin-bottom: 8px;
  animation: sword 2s ease-in-out infinite;
  filter: drop-shadow(0 4px 8px rgba(0,0,0,.22));
}
@keyframes sword { 0%,100%{transform:scale(1) rotate(-5deg)} 50%{transform:scale(1.1) rotate(5deg)} }
.logo-title {
  font-family: var(--font-display); font-size: clamp(22px,5vw,30px); font-weight: 900;
  background: linear-gradient(135deg,var(--purple),var(--gold));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  line-height: 1.2; margin-bottom: 4px;
}
.logo-sub { font-size: 12px; font-weight: 700; color: var(--teal); letter-spacing: 2px; text-transform: uppercase; }
.divider  { color: var(--gold); font-size: 13px; margin: 16px 0; letter-spacing: 10px; }
.form-hint { font-size: 15px; font-weight: 700; color: var(--text-mid); margin-bottom: 16px; }

.input-wrap {
  display: flex; align-items: center; gap: 10px;
  background: #F5F0FF; border: 2.5px solid var(--purple-light);
  border-radius: 14px; padding: 12px 16px; margin-bottom: 16px;
  transition: border-color .2s, box-shadow .2s;
}
.input-wrap:focus-within { border-color: var(--purple); box-shadow: 0 0 0 3px rgba(124,58,237,.15); }
.input-icon { font-size: 20px; flex-shrink: 0; }
.code-input {
  flex: 1; background: none; border: none; outline: none;
  font-family: var(--font-display); font-size: 20px; font-weight: 700;
  color: var(--purple-dark); letter-spacing: 4px; text-transform: uppercase;
}
.code-input::placeholder { color: var(--purple-light); font-size: 13px; letter-spacing: 2px; }

/* Buttons */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 8px;
  padding: 14px 28px; border-radius: 16px; font-family: var(--font-body);
  font-size: 16px; font-weight: 800; border: 3px solid transparent;
  transition: transform .15s, filter .15s, box-shadow .15s; text-decoration: none;
}
.btn:hover:not(:disabled) { transform: translateY(-2px); filter: brightness(1.06); }
.btn:active:not(:disabled) { transform: translateY(0); filter: brightness(.94); }
.btn:disabled { opacity: .5; cursor: not-allowed; }

.btn-purple {
  background: linear-gradient(135deg,var(--purple),var(--purple-dark));
  color: white; border-color: var(--purple-dark);
  box-shadow: 0 4px 16px rgba(124,58,237,.4); width: 100%;
}
.btn-lg { padding: 16px 32px; font-size: 18px; border-radius: 18px; }
.btn-arrow { font-size: 20px; transition: transform .2s; }
.btn-purple:hover .btn-arrow { transform: translateX(4px); }

.btn-gold {
  background: linear-gradient(135deg,#b5879f,#9f759a);
  color: white; border-color: #8a5f85;
  box-shadow: 0 4px 16px rgba(159,117,154,.4);
  padding: 16px 32px; font-size: 18px; border-radius: 18px; flex: 1;
}
.btn-red {
  background: linear-gradient(135deg,#f28b82,#e06b6b);
  color: white; border-color: #c95555;
  box-shadow: 0 4px 14px rgba(224,107,107,.35);
  padding: 16px 24px; font-size: 16px; border-radius: 18px;
}
.btn-red-dim { background: linear-gradient(135deg,#6B7280,#4B5563); border-color:#374151; box-shadow:0 2px 8px rgba(0,0,0,.18); }
.btn-outline-sm { background:rgba(255,255,255,.18); color:white; border:2px solid rgba(255,255,255,.5); border-radius:12px; padding:7px 16px; font-size:13px; font-weight:800; cursor:pointer; transition:background .2s; font-family:var(--font-body); }
.btn-outline-sm:hover { background:rgba(255,255,255,.3); }
.btn-back {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 8px 16px; border-radius: 12px; font-size: 14px; font-weight: 700;
  color: white; background: rgba(255,255,255,.2); border: 2px solid rgba(255,255,255,.4);
  transition: background .2s, transform .15s; backdrop-filter: blur(8px);
}
.btn-back:hover { background: rgba(255,255,255,.32); transform: translateX(-2px); }

.error-box {
  background: #FEF2F2; border: 2px solid #FCA5A5; color: #DC2626;
  border-radius: 10px; padding: 10px 14px; font-size: 14px; font-weight: 700;
  margin-bottom: 12px; text-align: left;
}
.footer-tip { margin-top: 20px; font-size: 13px; color: var(--text-light); font-weight: 600; }

/* ── NAME GRID ── */
.screen-wide { align-items: stretch; max-width: 960px; margin: 0 auto; width: 100%; }
.screen-hdr { display: flex; align-items: center; gap: 16px; padding: 6px 0 20px; }
.screen-title { font-family: var(--font-display); font-size: clamp(18px,4vw,26px); font-weight: 900; color: white; text-shadow: 0 2px 8px rgba(0,0,0,.3); }
.screen-sub { font-size: 13px; font-weight: 700; color: rgba(255,255,255,.75); margin-top: 2px; }

.name-grid { display: grid; grid-template-columns: repeat(auto-fill,minmax(172px,1fr)); gap: 14px; width: 100%; }
.student-tile {
  background: rgba(255,255,255,.8); border: 1.5px solid #C4B5FD; border-radius: 12px;
  padding: 16px 12px 14px; display: flex; flex-direction: column; align-items: center; gap: 8px;
  position: relative; box-shadow: 0 4px 16px rgba(0,0,0,.1);
  transition: transform .2s, box-shadow .2s, border-color .2s;
  cursor: pointer; text-align: center; animation: fadeUp .4s ease both;
}
.student-tile:hover { transform: translateY(-4px) scale(1.02); box-shadow: 0 12px 32px rgba(0,0,0,.22), 0 0 0 3px rgba(245,200,66,.4); border-color: var(--gold); }
.student-tile:active { transform: translateY(-1px) scale(1.01); }

.avatar-ring { border: 3px solid; border-radius: 50%; padding: 0; background: white; display: flex; align-items: center; justify-content: center; overflow: hidden; width: 130px; height: 130px; flex-shrink: 0; }
.avatar-ring img, .t-s-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; display: block; }
.tile-name { font-size: 17px; font-weight: 900; color: var(--text-dark); }
.tile-cls  { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; }
.tile-lvl  { position: absolute; top: -9px; right: -9px; color: white; font-size: 11px; font-weight: 900; padding: 3px 9px; border-radius: 20px; border: 2px solid white; box-shadow: 0 2px 6px rgba(0,0,0,.2); }

/* ── PASSWORD ── */
.pin-card {
  background: rgba(255,255,255,.8); border: 1.5px solid #C4B5FD; border-radius: 12px;
  box-shadow: 0 4px 16px rgba(0,0,0,.1);
  padding: 28px 28px 32px; width: 100%; max-width: 380px; text-align: center; position: relative;
}
.pin-avatar { margin: 12px 0 16px; display: flex; flex-direction: column; align-items: center; gap: 8px; }
.avatar-ring-lg { border: 4px solid var(--gold); border-radius: 50%; padding: 4px; background: linear-gradient(135deg,#F5F0FF,#E0F7FF); box-shadow: 0 4px 20px rgba(245,200,66,.3); display:flex; align-items:center; justify-content:center; }
.pin-name  { font-family: var(--font-display); font-size: 20px; font-weight: 900; color: var(--purple-dark); }
.pin-title { font-size: 13px; font-weight: 700; color: var(--gold-dark); font-style: italic; }
.pin-hint  { font-size: 15px; font-weight: 700; color: var(--text-mid); margin-bottom: 14px; }
.pin-dots  { display: flex; gap: 14px; justify-content: center; margin-bottom: 16px; }
.pin-dot   { width: 18px; height: 18px; border-radius: 50%; border: 3px solid var(--purple-light); background: white; transition: background .15s, border-color .15s, transform .15s; }
.pin-dot.on{ background: var(--purple); border-color: var(--purple-dark); transform: scale(1.15); }
.numpad { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; margin-top: 8px; }
.num-btn {
  background: linear-gradient(135deg,#F5F0FF,#EDE8FF); border: 2.5px solid var(--purple-light);
  border-radius: 14px; padding: 16px 0; font-size: 22px; font-weight: 900; color: var(--purple-dark);
  box-shadow: 0 3px 0 var(--purple-light); transition: transform .1s, box-shadow .1s;
}
.num-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 0 var(--purple-light); }
.num-btn:active { transform: translateY(2px); box-shadow: 0 1px 0 var(--purple-light); }
.num-del { background: linear-gradient(135deg,#FEF2F2,#FECACA); border-color:#FCA5A5; color:var(--red); box-shadow:0 3px 0 #FCA5A5; }
.num-del:hover { background: linear-gradient(135deg,#FECACA,#FCA5A5); }
.num-del:disabled { opacity:.3; cursor:not-allowed; transform:none; }
.num-empty { pointer-events: none; }

/* ── CHARACTER HUB ── */
.hub-screen { padding: 16px 12px 36px; }
.hub-screen::before { content:''; position:fixed; inset:0; background:url('/tiles/hub_background.png') center/cover no-repeat; opacity:0.6; z-index:0; pointer-events:none; }
.hub-screen > * { position:relative; z-index:1; }
.hub-wrap { width: 100%; max-width: 860px; margin: 0 auto; display: flex; flex-direction: column; gap: 14px; }
.hub-header { display: flex; align-items: center; justify-content: space-between; padding: 2px 0 8px; }
.hub-badge { font-family: var(--font-display); font-size: 16px; font-weight: 700; color: white; text-shadow: 0 1px 4px rgba(0,0,0,.3); }

.hub-panel { background: rgba(255,255,255,.8); border: 1.5px solid #C4B5FD; border-radius: 12px; box-shadow: 0 4px 16px rgba(0,0,0,.1); padding: 20px 20px 22px; }
.panel-title { font-family: var(--font-display); font-size: 14px; font-weight: 700; color: var(--purple-dark); letter-spacing: .5px; margin-bottom: 14px; padding-bottom: 10px; border-bottom: 1.5px solid #EDE9FE; }

/* Identity */
.id-panel { display: flex; align-items: center; gap: 20px; }
.id-avatar { flex-shrink: 0; }
.avatar-ring-xl { border: 5px solid #3B1F8C; border-radius: 50%; padding: 6px; background: linear-gradient(135deg,#F5F0FF,#E0F7FF); box-shadow: 0 6px 24px rgba(59,31,140,.35); display:flex; align-items:center; justify-content:center; }
.id-info { flex: 1; display: flex; flex-direction: column; gap: 7px; }
.id-lvl  { display: inline-flex; align-items: center; gap: 4px; background: linear-gradient(135deg,#2d5fc4,#224998); color: white; font-size: 13px; font-weight: 900; padding: 4px 12px; border-radius: 20px; width: fit-content; box-shadow: 0 2px 8px rgba(34,73,152,.35); }
.id-name { font-family: var(--font-display); font-size: clamp(17px,3.5vw,25px); font-weight: 900; color: var(--text-dark); line-height: 1.1; }
.id-title{ display: inline-flex; align-items: center; gap: 6px; font-size: 13px; font-weight: 700; color: var(--teal-dark); font-style: italic; background: #E0F7FF; padding: 6px 12px; border-radius: 10px; }

/* Stats */
.stat-row  { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.stat-icon { font-size: 18px; flex-shrink: 0; }
.stat-lbl  { width: 28px; font-size: 13px; font-weight: 900; color: var(--text-dark); flex-shrink: 0; }
.stat-track{ flex: 1; height: 16px; border-radius: 8px; overflow: hidden; border: 2px solid rgba(0,0,0,.07); }
.stat-fill { height: 100%; border-radius: 6px; transition: width .9s cubic-bezier(.34,1.56,.64,1); }
.stat-val  { width: 40px; text-align: right; font-size: 13px; font-weight: 900; color: var(--text-mid); flex-shrink: 0; }
.xp-sect  { margin-top: 16px; padding-top: 14px; border-top: 1.5px solid #EDE9FE; }
.xp-hdr   { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 13px; font-weight: 800; }
.xp-lbl   { color: var(--gold-dark); }
.xp-nums  { color: var(--text-mid); font-weight: 700; }
.xp-track { height: 20px; background: #FEF3C7; border-radius: 10px; border: 1.5px solid #FDE68A; overflow: hidden; position: relative; }
.xp-fill  { height: 100%; border-radius: 8px; background: linear-gradient(90deg,var(--gold),var(--gold-light)); transition: width 1.1s cubic-bezier(.34,1.56,.64,1); }
.xp-pct   { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); font-size: 11px; font-weight: 900; color: var(--text-dark); }

/* Inventory */
.inv-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 8px; }
.item-slot { background: white; border: 1.5px solid rgba(245,200,66,.35); border-radius: 10px; padding: 8px 4px 6px; display: flex; flex-direction: column; align-items: center; gap: 4px; transition: transform .2s, box-shadow .2s; box-shadow: 0 0 0 2px rgba(245,200,66,.1); aspect-ratio: 1; justify-content: center; }
.item-slot:not(.empty):hover { transform: translateY(-2px); box-shadow: 0 4px 14px rgba(245,200,66,.25), 0 0 0 2px rgba(245,200,66,.2); }
.item-slot.empty { background: transparent; border: 1.5px dashed #D1D5DB; box-shadow: none; }
.item-slot.empty::before { content: "+"; font-size: 18px; font-weight: 300; color: #D1D5DB; }
.item-img { width: 80%; aspect-ratio: 1; object-fit: contain; display: block; }
.item-name { font-size: 9px; font-weight: 700; color: var(--text-light); text-align: center; line-height: 1.2; }

/* Bosses */
.boss-list { display: flex; flex-direction: column; gap: 8px; }
.boss-row  { display: flex; align-items: center; gap: 10px; background: linear-gradient(90deg,#d4edda,#e8f5e9); border: 1.5px solid #75be85; border-radius: 10px; padding: 10px 14px; }
.boss-ico  { font-size: 22px; }
.boss-nm   { flex: 1; font-size: 14px; font-weight: 800; color: var(--text-dark); }
.boss-std  { font-size: 11px; font-weight: 900; color: white; background: var(--teal-dark); padding: 2px 8px; border-radius: 20px; flex-shrink: 0; }
.boss-empty{ text-align:center; font-size:14px; font-weight:700; color:var(--text-light); font-style:italic; padding:12px 0; }

/* Loading dots */
.loading-dots { display: flex; justify-content: center; gap: 8px; margin-top: 20px; }
.loading-dots span { width: 10px; height: 10px; border-radius: 50%; background: var(--purple-light); animation: dotPulse 1.4s ease-in-out infinite; }
.loading-dots span:nth-child(2) { animation-delay: .2s; }
.loading-dots span:nth-child(3) { animation-delay: .4s; }
@keyframes dotPulse { 0%,80%,100%{transform:scale(.6);opacity:.4} 40%{transform:scale(1);opacity:1} }

/* Actions */
.hub-actions { display: flex; gap: 12px; }
.toast {
  position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
  background: linear-gradient(135deg,var(--teal),var(--teal-dark));
  color: white; font-size: 15px; font-weight: 800;
  padding: 14px 28px; border-radius: 50px;
  box-shadow: 0 8px 24px rgba(8,145,178,.4); z-index: 999; white-space: nowrap;
  animation: fadeUp .3s ease;
}

/* Responsive */
@media (max-width:600px) {
  .login-card { padding: 28px 18px; }
  .screen { padding: 14px 10px 28px; }
  .id-panel { flex-direction: column; text-align: center; gap: 12px; }
  .id-lvl, .id-title { margin: 0 auto; }
  .hub-actions { flex-direction: column; }
  .btn-gold, .btn-red { width: 100%; }
  .name-grid { grid-template-columns: repeat(2,1fr); }
}
/* Avatar display & picker */
.hub-avatar-img { width:272px; height:272px; object-fit:cover; border-radius:50%; display:block; }
/* ── Card corner customize button ── */
.id-panel-wrap { position:relative; }
.id-cust-btn { position:absolute; bottom:10px; right:12px; background:none; border:none; padding:4px; cursor:pointer; opacity:0.5; transition:opacity .15s,transform .12s; }
.id-cust-btn:hover { opacity:1; transform:scale(1.1); }
.id-cust-btn img { width:20px; height:20px; object-fit:contain; display:block; }
/* ── Customize overlay ── */
.cust-overlay { position:fixed; inset:0; z-index:900; display:flex; align-items:center; justify-content:center; background:rgba(0,0,0,.7); backdrop-filter:blur(4px); padding:16px; }
.cust-modal { background:linear-gradient(155deg,#1E1B4B 0%,#0F172A 100%); border:1.5px solid rgba(124,58,237,.4); border-radius:20px; width:min(95vw,480px); max-height:88vh; display:flex; flex-direction:column; box-shadow:0 28px 80px rgba(0,0,0,.7); overflow:hidden; }
.cust-header { display:flex; align-items:center; justify-content:space-between; padding:16px 20px 14px; border-bottom:1px solid rgba(124,58,237,.25); flex-shrink:0; }
.cust-header-title { font-family:var(--font-display); font-size:17px; font-weight:900; color:white; }
.cust-body { overflow-y:auto; flex:1; }
.cust-section { padding:18px 20px; border-bottom:1px solid rgba(255,255,255,.07); }
.cust-section-hdr { font-size:11px; font-weight:900; color:rgba(180,160,255,.65); letter-spacing:.7px; text-transform:uppercase; margin-bottom:14px; }
.title-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:8px; }
.title-card { padding:11px 10px; border-radius:10px; border:2px solid rgba(255,255,255,.1); background:rgba(255,255,255,.04); cursor:pointer; color:rgba(255,255,255,.8); font-size:13px; font-weight:700; text-align:center; transition:border-color .15s,background .15s; line-height:1.3; }
.title-card:hover { border-color:var(--purple-light); background:rgba(124,58,237,.12); }
.title-card.cust-active { border-color:var(--gold); background:rgba(245,200,66,.1); color:var(--gold-light); }
.cust-footer { padding:14px 20px 16px; border-top:1px solid rgba(255,255,255,.07); flex-shrink:0; }
.cust-save-btn { width:100%; padding:14px; border-radius:12px; border:none; background:var(--gold); color:#1a0a00; font-size:15px; font-weight:900; cursor:pointer; font-family:var(--font-display); letter-spacing:.3px; transition:opacity .15s,transform .12s; }
.cust-save-btn:hover { opacity:.9; transform:translateY(-1px); }
/* ── Avatar Modal (standalone — keep for reference) ── */
.av-modal { position:fixed; inset:0; z-index:800; display:flex; align-items:center; justify-content:center; }
.av-modal-bd { position:absolute; inset:0; background:rgba(0,0,0,.75); backdrop-filter:blur(5px); }
.av-modal-card { position:relative; z-index:1; background:linear-gradient(155deg,#1E1B4B 0%,#0F172A 100%); border:2px solid rgba(124,58,237,.38); border-radius:22px; padding:20px; width:min(95vw,480px); max-height:88vh; overflow-y:auto; box-shadow:0 28px 80px rgba(0,0,0,.75); }
.av-modal-nav { display:grid; grid-template-columns:1fr auto 1fr; align-items:center; margin-bottom:12px; min-height:28px; }
.av-modal-nav-right { display:flex; justify-content:flex-end; }
.av-nav-btn { background:none; border:none; color:rgba(255,255,255,.38); cursor:pointer; font-size:12px; font-weight:800; padding:4px 2px; letter-spacing:.3px; transition:color .15s; }
.av-nav-btn:hover { color:rgba(255,255,255,.78); }
.av-close-btn { background:none; border:1.5px solid rgba(255,255,255,.2); border-radius:50%; color:rgba(255,255,255,.5); cursor:pointer; font-size:12px; width:26px; height:26px; display:flex; align-items:center; justify-content:center; transition:all .15s; padding:0; }

.av-steps { display:flex; align-items:center; gap:4px; justify-content:center; }

.av-live-label { font-size:9px; font-weight:800; color:rgba(255,255,255,.35); letter-spacing:.5px; text-transform:uppercase; }
/* class grid — icon cards ~150px */
.av-class-grid { display:grid; grid-template-columns:repeat(2,140px); gap:8px; justify-content:center; }
.av-class-card { display:flex; flex-direction:column; align-items:center; justify-content:center; gap:0; padding:8px 8px 8px; border-radius:10px; border:3px solid rgba(255,255,255,.1); background:rgba(255,255,255,.04); cursor:pointer; transition:border-color .15s,background .15s,transform .12s; color:white; aspect-ratio:1; }
.av-class-card:hover  { border-color:var(--purple-light); background:rgba(124,58,237,.12); transform:translateY(-2px); }
.av-class-card.av-sel { border-color:var(--gold); background:rgba(245,200,66,.08); box-shadow:0 0 0 1px rgba(245,200,66,.22); }
.av-class-icon-wrap { width:75%; aspect-ratio:1; display:flex; align-items:center; justify-content:center; padding:0; margin-bottom:6px; }
.av-class-icon-wrap img { width:100%; height:100%; object-fit:contain; opacity:.9; }
.av-class-name { font-size:11px; font-weight:900; letter-spacing:.5px; text-transform:uppercase; }
/* variant grid */

.av-variant-btn { display:flex; flex-direction:column; align-items:center; gap:6px; padding:8px 6px 10px; border-radius:14px; border:3px solid rgba(255,255,255,.1); background:rgba(255,255,255,.04); cursor:pointer; transition:border-color .15s,background .15s,transform .12s; color:white; }
.av-variant-btn:hover  { border-color:var(--purple-light); transform:translateY(-2px); }
.av-variant-btn.av-sel { border-color:var(--gold); background:rgba(245,200,66,.1); }
.av-variant-btn img { width:100%; aspect-ratio:1; object-fit:cover; object-position:top center; border-radius:10px; display:block; }
.av-variant-btn span { font-size:11px; font-weight:800; color:rgba(255,255,255,.6); letter-spacing:.4px; }
/* skin tone */
.av-tone-row { display:flex; justify-content:center; gap:16px; margin-bottom:10px; }
.av-tone-btn { display:flex; flex-direction:column; align-items:center; gap:7px; background:none; border:none; cursor:pointer; padding:4px; }
.av-tone-dot { width:44px; height:44px; border-radius:50%; border:4px solid transparent; transition:transform .15s,box-shadow .15s; }

.av-tone-btn span { font-size:10px; font-weight:800; color:rgba(255,255,255,.52); letter-spacing:.3px; }
.av-saved-badge { display:flex; align-items:center; justify-content:center; gap:6px; margin-top:12px; font-size:11px; font-weight:800; color:#34D399; letter-spacing:.4px; opacity:0; animation:fadeIn .4s .1s both; }
.av-save-btn { display:block; width:100%; margin-top:14px; padding:12px; border-radius:14px; border:none; background:var(--gold); color:#1a1235; font-size:14px; font-weight:900; letter-spacing:.5px; cursor:pointer; transition:opacity .15s,transform .12s; }
.av-save-btn:hover { opacity:.88; transform:translateY(-1px); }
@keyframes fadeIn { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:translateY(0)} }

/* ── Lesson Stop ── */
.ls-screen { padding: 16px 12px 48px; overflow-y: auto; }
.ls-wrap { width: 100%; max-width: 640px; margin: 0 auto; display: flex; flex-direction: column; gap: 14px; }
.ls-nav { display: flex; align-items: center; gap: 14px; padding-bottom: 4px; }
.ls-breadcrumb { display: flex; align-items: center; gap: 6px; }
.ls-bc-land { font-size: 11px; font-weight: 800; color: rgba(255,255,255,.45); letter-spacing: .8px; text-transform: uppercase; }
.ls-bc-sep { color: rgba(255,255,255,.3); font-size: 12px; }
.ls-bc-tile { font-family: var(--font-display); font-size: 14px; font-weight: 900; color: var(--gold); }
.ls-video-btn { display: flex; align-items: center; justify-content: center; gap: 12px; background: linear-gradient(135deg, #6D28D9, #4C1D95); color: white; font-family: var(--font-display); font-size: 18px; font-weight: 900; padding: 22px 28px; border-radius: 16px; border: 3px solid var(--gold); box-shadow: 0 6px 28px rgba(109,40,217,.45), inset 0 1px 0 rgba(255,255,255,.15); cursor: pointer; width: 100%; transition: transform .15s, box-shadow .15s; letter-spacing: .5px; }

.ls-play-icon { font-size: 22px; }
.ls-session-card { background: rgba(255,255,255,.8); border: 1.5px solid #C4B5FD; border-radius: 12px; box-shadow: 0 4px 16px rgba(0,0,0,.1); padding: 18px 20px; }
.ls-session-title { font-family: var(--font-display); font-size: 21px; font-weight: 900; color: var(--text-dark); margin-bottom: 5px; }
.ls-session-desc { font-size: 14px; font-weight: 700; color: var(--text-mid); }
.ls-tiers { display: flex; flex-direction: column; gap: 10px; }
.ls-tier { border-radius: var(--card-radius); overflow: hidden; box-shadow: 0 4px 16px rgba(0,0,0,.13); }
.ls-tier-must   { border: 3px solid #EF4444; }
.ls-tier-should { border: 3px solid #F59E0B; }
.ls-tier-aspire { border: 3px solid #10B981; }
.ls-tier-header { display: flex; align-items: center; gap: 10px; padding: 13px 18px 11px; border-bottom: 2px solid rgba(0,0,0,.06); }

.ls-tier-should .ls-tier-header { background: #FFFBEB; }
.ls-tier-aspire .ls-tier-header { background: #F0FDF4; }
.ls-tier-icon { font-size: 18px; }
.ls-tier-label { font-family: var(--font-display); font-size: 13px; font-weight: 900; letter-spacing: .6px; text-transform: uppercase; }
.ls-tier-must   .ls-tier-label { color: #DC2626; }
.ls-tier-should .ls-tier-label { color: #D97706; }
.ls-tier-aspire .ls-tier-label { color: #059669; }
.ls-tier-body { background: rgba(255,255,255,.8); border: 1.5px solid #C4B5FD; border-top: none; padding: 13px 18px 15px; display: flex; flex-direction: column; gap: 9px; }
.ls-task { display: flex; align-items: flex-start; gap: 10px; font-size: 14px; font-weight: 700; color: var(--text-dark); line-height: 1.45; cursor: pointer; user-select: none; border-radius: 8px; padding: 2px 4px; transition: background .1s; }
.ls-task:hover { background: rgba(0,0,0,.04); }
.ls-task input[type="checkbox"] { width: 18px; height: 18px; flex-shrink: 0; margin-top: 1px; cursor: pointer; }
.ls-task-done { opacity: .5; }
.ls-task-done span:last-child { text-decoration: line-through; }
.ls-tier-must   input[type="checkbox"] { accent-color: #EF4444; }
.ls-tier-should input[type="checkbox"] { accent-color: #D97706; }
.ls-tier-aspire input[type="checkbox"] { accent-color: #10B981; }
.ls-submit-btn { display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%; padding: 20px 28px; border-radius: 16px; font-family: var(--font-display); font-size: 18px; font-weight: 900; letter-spacing: .5px; cursor: pointer; transition: transform .15s, box-shadow .15s; border: 3px solid transparent; }
.ls-submit-btn:not(:disabled) { background: linear-gradient(135deg,#059669,#047857); color: white; border-color: #34D399; box-shadow: 0 6px 28px rgba(5,150,105,.4); }
.ls-submit-btn:not(:disabled):hover { transform: translateY(-2px); box-shadow: 0 12px 36px rgba(5,150,105,.55); }
.ls-submit-btn:disabled { background: rgba(255,255,255,.08); color: rgba(255,255,255,.3); border-color: rgba(255,255,255,.12); cursor: not-allowed; }
/* XP Celebration overlay */
.xp-celebrate { position: fixed; inset: 0; z-index: 9999; display: flex; align-items: center; justify-content: center; pointer-events: none; }
.xp-pop { display: flex; flex-direction: column; align-items: center; gap: 10px; animation: xpPop .45s cubic-bezier(.34,1.56,.64,1) both; }
.xp-pop-amount { font-family: var(--font-display); font-size: 64px; font-weight: 900; color: var(--gold); text-shadow: 0 0 40px rgba(245,200,66,.9), 0 4px 20px rgba(0,0,0,.6); line-height: 1; }
.xp-pop-levelup { font-family: var(--font-display); font-size: 30px; font-weight: 900; color: white; text-shadow: 0 0 24px rgba(124,58,237,.9), 0 2px 10px rgba(0,0,0,.5); animation: xpPop .45s .18s cubic-bezier(.34,1.56,.64,1) both; }
.xp-pop-newlvl  { font-family: var(--font-display); font-size: 20px; font-weight: 900; color: var(--gold-light); text-shadow: 0 0 16px rgba(245,200,66,.7); animation: xpPop .45s .32s cubic-bezier(.34,1.56,.64,1) both; }
.xp-celebrate-out .xp-pop { animation: xpFadeOut .38s ease both; }
@keyframes xpPop     { from { opacity:0; transform:scale(.4) translateY(24px); } to { opacity:1; transform:scale(1) translateY(0); } }
@keyframes xpFadeOut { from { opacity:1; transform:scale(1) translateY(0); }   to { opacity:0; transform:scale(1.15) translateY(-28px); } }
.ls-workbook { text-align: center; font-size: 12px; font-weight: 700; color: rgba(255,255,255,.45); letter-spacing: .5px; padding-top: 2px; }
/* ── Writing Event Screen ── */
@keyframes we-float { 0%,100%{transform:translateY(0);opacity:.5} 50%{transform:translateY(-18px);opacity:.9} }
@keyframes we-pulse { 0%,100%{text-shadow:0 0 20px #F59E0B88,0 2px 8px rgba(0,0,0,.8)} 50%{text-shadow:0 0 40px #F59E0BCC,0 0 80px #D9770644,0 2px 8px rgba(0,0,0,.8)} }
.we-screen { position:relative; display:flex; flex-direction:column; min-height:100vh; background:radial-gradient(ellipse at 50% 30%,rgba(217,119,6,.14) 0%,transparent 65%), linear-gradient(160deg,#0a0600 0%,#1a0a00 50%,#0a0600 100%); overflow:hidden; }
.we-particle { position:absolute; border-radius:50%; background:#F59E0B; pointer-events:none; animation:we-float linear infinite; }

.we-return:hover { color:rgba(255,255,255,.8); }
.we-inner { position:relative; z-index:2; display:flex; flex-direction:column; align-items:center; padding:56px 24px 48px; gap:20px; max-width:640px; margin:0 auto; width:100%; }
.we-header { text-align:center; display:flex; flex-direction:column; align-items:center; gap:8px; }
.we-title { font-family:var(--font-display); font-size:clamp(22px,5vw,36px); font-weight:900; color:#FDE68A; letter-spacing:2px; animation:we-pulse 3s ease-in-out infinite; line-height:1.15; }

.we-badge-type { background:rgba(124,58,237,.2); color:#C4B5FD; border:1.5px solid rgba(124,58,237,.5); }

.we-prompt-card { width:100%; background:linear-gradient(135deg,#1c1000 0%,#140c00 100%); border:1.5px solid rgba(217,119,6,.4); border-radius:16px; padding:24px 28px; box-shadow:0 8px 32px rgba(0,0,0,.5),inset 0 1px 0 rgba(245,158,11,.1); }
.we-prompt-label { font-size:10px; font-weight:900; color:#D97706; letter-spacing:2px; text-transform:uppercase; margin-bottom:12px; display:flex; align-items:center; gap:8px; }

.we-check-item:hover { background:rgba(245,158,11,.06); border-color:rgba(245,158,11,.2); }

.we-check-icon { flex-shrink:0; width:22px; height:22px; border-radius:6px; border:2px solid rgba(255,255,255,.2); display:flex; align-items:center; justify-content:center; font-size:13px; color:transparent; margin-top:1px; transition:all .15s; }
.we-check-item.checked .we-check-icon { background:#059669; border-color:#059669; color:white; }

.we-check-item.checked span:last-child { color:rgba(255,255,255,.45); text-decoration:line-through; }
.we-ready-btn { width:100%; padding:16px 24px; border-radius:14px; border:none; background:linear-gradient(135deg,#D97706,#F59E0B); color:#1a0a00; font-size:16px; font-weight:900; font-family:var(--font-display); cursor:pointer; letter-spacing:.5px; transition:opacity .15s,transform .1s; margin-top:4px; }
.we-ready-btn:hover:not(:disabled) { opacity:.92; transform:translateY(-1px); }
.we-ready-btn:disabled,.we-ready-btn.disabled { background:rgba(255,255,255,.1); color:rgba(255,255,255,.3); cursor:not-allowed; transform:none; }
/* Welcome Splash */
@keyframes ws-rise { 0%{transform:translateY(0) scale(1);opacity:.7} 100%{transform:translateY(-110vh) scale(.6);opacity:0} }
@keyframes ws-title-pulse { 0%,100%{text-shadow:0 0 30px #F59E0B88,0 2px 8px rgba(0,0,0,.9)} 50%{text-shadow:0 0 70px #F59E0BCC,0 0 140px #D9770655,0 2px 12px rgba(0,0,0,.9)} }

.ws-screen { position:relative; min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; background:linear-gradient(160deg,#03051A 0%,#070B2E 50%,#020410 100%); overflow:hidden; }

.ws-divider { width:clamp(140px,35vw,240px); height:2px; background:linear-gradient(90deg,transparent,#F59E0B88,#F59E0B,#F59E0B88,transparent); border:none; margin:0; flex-shrink:0; }

.ws-cta-btn:hover { transform:translateY(-3px) scale(1.02); opacity:.92; }
/* Teacher view writing event checklist */
.we-teacher-cl { margin-top:8px; display:flex; flex-direction:column; gap:4px; }

.boss-nav { display: flex; align-items: center; gap: 14px; width: 100%; }

}

.boss-lore-card { background: rgba(0,0,0,.38); border: 1.5px solid rgba(239,68,68,.35); border-radius: 14px; padding: 16px 20px; width: 100%; }
.boss-lore { font-size: 14px; font-weight: 600; color: rgba(255,255,255,.72); font-style: italic; line-height: 1.65; margin: 0; text-align: center; }
.boss-hp-card { background: rgba(255,255,255,.8); border: 1.5px solid #C4B5FD; border-radius: 12px; box-shadow: 0 4px 16px rgba(0,0,0,.1); padding: 14px 20px; width: 100%; display: flex; flex-direction: column; align-items: center; gap: 9px; }
.boss-hp-label { font-size: 11px; font-weight: 900; letter-spacing: .8px; text-transform: uppercase; color: var(--text-mid); }
.boss-hp-dots { display: flex; gap: 5px; flex-wrap: wrap; justify-content: center; }
.boss-hp-dot { width: 22px; height: 22px; border-radius: 50%; background: #E5E7EB; border: 2px solid #D1D5DB; }
.boss-hp-dot.filled { background: #EF4444; border-color: #DC2626; box-shadow: 0 0 7px rgba(239,68,68,.55); }
.boss-hp-val { font-family: var(--font-display); font-size: 16px; font-weight: 900; color: var(--text-dark); }
.boss-hp-warning { background: linear-gradient(135deg,rgba(220,38,38,.18),rgba(220,38,38,.08)); border: 2px solid rgba(220,38,38,.5); border-radius: 14px; padding: 14px 18px; font-size: 14px; font-weight: 700; color: #FCA5A5; text-align: center; width: 100%; line-height: 1.55; }
.boss-fight-btn { display: flex; align-items: center; justify-content: center; gap: 12px; width: 100%; padding: 22px 28px; border-radius: 16px; font-family: var(--font-display); font-size: 20px; font-weight: 900; letter-spacing: .5px; cursor: pointer; transition: transform .15s, box-shadow .15s; background: linear-gradient(135deg,#DC2626,#991B1B); color: white; border: 3px solid var(--gold); box-shadow: 0 6px 28px rgba(220,38,38,.45), inset 0 1px 0 rgba(255,255,255,.12); }
.boss-fight-btn:hover { transform: translateY(-2px); box-shadow: 0 14px 44px rgba(220,38,38,.65), inset 0 1px 0 rgba(255,255,255,.12); }
/* Teacher task status */
.t-task-status { display: flex; align-items: center; gap: 5px; flex-wrap: wrap; margin-top: 5px; }
.t-tile-badge { font-size: 11px; font-weight: 800; color: var(--purple-dark); background: #F5F0FF; border: 1.5px solid var(--purple-light); border-radius: 20px; padding: 2px 8px; white-space: nowrap; }
.t-must-badge { font-size: 11px; font-weight: 700; color: #DC2626; background: #FEF2F2; border: 1.5px solid #FECACA; border-radius: 20px; padding: 2px 8px; white-space: nowrap; }
.t-must-badge.t-must-done { color: #059669; background: #F0FDF4; border-color: #A7F3D0; }
/* Teacher tile view */
.tt-section-hdr { display: flex; align-items: center; gap: 8px; font-family: var(--font-display); font-size: 12px; font-weight: 900; color: rgba(255,255,255,.7); letter-spacing: .8px; text-transform: uppercase; padding: 4px 2px 2px; }
.tt-count { background: var(--gold); color: #7C3AED; font-size: 11px; font-weight: 900; padding: 2px 8px; border-radius: 20px; }
.tt-student-list { display: flex; flex-direction: column; gap: 10px; }
.tt-empty { background: rgba(255,255,255,.08); border-radius: 12px; padding: 18px; text-align: center; font-size: 14px; font-weight: 700; color: rgba(255,255,255,.4); }
.tt-student-row { background: rgba(255,255,255,.8); border: 1.5px solid #C4B5FD; border-radius: 12px; padding: 14px 16px; box-shadow: 0 4px 16px rgba(0,0,0,.1); }
.tt-student-header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; padding-bottom: 10px; border-bottom: 2px solid rgba(0,0,0,.06); }
.tt-av { width: 40px; height: 40px; border-radius: 50%; border: 2.5px solid; overflow: hidden; flex-shrink: 0; }
.tt-av img { width: 100%; height: 100%; object-fit: cover; display: block; }
.tt-name { font-family: var(--font-display); font-size: 14px; font-weight: 900; color: var(--text-dark); }
.tt-cls  { font-size: 11px; font-weight: 700; margin-top: 1px; }
.tt-tiers { display: flex; flex-direction: column; gap: 6px; }
.tt-tier-row { display: flex; flex-direction: column; gap: 3px; }
.tt-tier-lbl { font-size: 10px; font-weight: 900; letter-spacing: .5px; text-transform: uppercase; margin-bottom: 2px; }
.tt-tier-must   .tt-tier-lbl { color: #DC2626; }
.tt-tier-should .tt-tier-lbl { color: #D97706; }
.tt-tier-aspire .tt-tier-lbl { color: #059669; }
.tt-task-item { display: flex; align-items: flex-start; gap: 8px; font-size: 13px; font-weight: 600; color: var(--text-dark); line-height: 1.4; }
.tt-task-item.done { opacity: .45; }
.tt-task-item .tt-check { font-size: 13px; flex-shrink: 0; }
.tt-task-item.done .tt-check { color: #10B981; }

@media (min-width:768px) {
  .hub-wrap { display: grid; grid-template-columns: 1fr 1fr; grid-template-areas: "hdr hdr" "id stats" "inv bosses" "acts acts"; }
  .hub-header      { grid-area: hdr; }
  .id-panel-wrap   { grid-area: id; }
  .stats-panel-wrap{ grid-area: stats; }
  .inv-panel-wrap  { grid-area: inv; }
  .boss-panel-wrap { grid-area: bosses; }
  .hub-actions     { grid-area: acts; }
}

/* ════════════════════════════════════════
   TEACHER SCREENS
════════════════════════════════════════ */
.teacher-link { display:block; margin-top:18px; font-size:12px; font-weight:700; color:var(--text-light); text-decoration:none; cursor:pointer; transition:color .2s; background:none; border:none; }
.teacher-link:hover { color:var(--purple); }

/* Teacher login */
.t-login-card {
  background:rgba(255,255,255,.97); border:3px solid var(--purple); border-radius:var(--card-radius);
  box-shadow:var(--card-shadow), 0 0 50px rgba(91,33,182,.25);
  padding:36px 32px; width:100%; max-width:400px; text-align:center; position:relative; z-index:1;
}
.t-login-icon { font-size:44px; display:block; margin-bottom:10px; }
.t-login-title { font-family:var(--font-display); font-size:22px; font-weight:900; color:var(--purple-dark); margin-bottom:4px; }
.t-login-sub   { font-size:12px; font-weight:700; color:var(--text-light); letter-spacing:1.5px; text-transform:uppercase; margin-bottom:20px; }
.pw-input {
  width:100%; background:#F5F0FF; border:2.5px solid var(--purple-light); border-radius:14px;
  padding:13px 16px; font-size:16px; font-weight:700; color:var(--purple-dark);
  outline:none; margin-bottom:14px; letter-spacing:2px; transition:border-color .2s, box-shadow .2s;
}
.pw-input:focus { border-color:var(--purple); box-shadow:0 0 0 3px rgba(124,58,237,.15); }

/* Teacher dashboard */
.t-dash-screen { padding:14px 14px 36px; align-items:stretch; }
.t-dash-wrap   { width:100%; max-width:1040px; margin:0 auto; display:flex; flex-direction:column; gap:12px; }
.t-dash-hdr    { display:flex; align-items:center; justify-content:space-between; padding:2px 0 6px; }
.t-dash-title  { font-family:var(--font-display); font-size:18px; font-weight:900; color:white; text-shadow:0 1px 4px rgba(0,0,0,.3); }

/* Period tabs */
.period-tabs { display:flex; gap:8px; }
.period-tab  {
  padding:8px 18px; border-radius:12px; font-size:14px; font-weight:800; cursor:pointer;
  background:rgba(255,255,255,.18); color:white; border:2px solid rgba(255,255,255,.35);
  transition:background .2s, border-color .2s, transform .15s;
}
.period-tab:hover  { background:rgba(255,255,255,.28); transform:translateY(-1px); }
.period-tab.active { background:white; color:var(--purple-dark); border-color:var(--gold); box-shadow:0 3px 10px rgba(0,0,0,.15); }

/* Help alert bar */
.help-alert {
  background:linear-gradient(135deg,#FEF2F2,#FFF0F0); border:2px solid #FCA5A5;
  border-radius:14px; padding:12px 18px; display:flex; align-items:center; gap:10px;
  font-size:14px; font-weight:800; color:#DC2626;
}
.help-alert-count { background:#DC2626; color:white; border-radius:50%; width:24px; height:24px; display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:900; flex-shrink:0; }

/* Teacher student grid */
.t-student-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(190px,1fr)); gap:12px; }
.t-s-card {
  background:rgba(255,255,255,.8); border:1.5px solid #C4B5FD; border-radius:12px;
  padding:14px 12px 12px; cursor:pointer; position:relative;
  box-shadow:0 4px 16px rgba(0,0,0,.1);
  transition:transform .2s, box-shadow .2s, border-color .2s;
  display:flex; flex-direction:column; gap:7px;
}
.t-s-card:hover { transform:translateY(-3px); box-shadow:0 8px 24px rgba(0,0,0,.18); border-color:var(--gold); }
.t-s-card.has-flag { border-color:#FCA5A5; background:linear-gradient(160deg,rgba(255,255,255,.97),#FFF5F5); }
.t-s-card.has-flag:hover { border-color:#EF4444; }

.t-s-top { display:flex; align-items:center; gap:9px; }
.t-s-avatar { width:44px; height:44px; border-radius:50%; border:2.5px solid; padding:2px; background:white; flex-shrink:0; overflow:hidden; display:flex; align-items:center; justify-content:center; }
.t-s-info { flex:1; min-width:0; }
.t-s-name  { font-size:14px; font-weight:900; color:var(--text-dark); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.t-s-cls   { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.4px; }

.t-mini-bars { display:flex; flex-direction:column; gap:3px; }
.t-mini-row  { display:flex; align-items:center; gap:5px; }
.t-mini-lbl  { width:16px; font-size:10px; font-weight:900; color:var(--text-light); flex-shrink:0; }
.t-mini-track { flex:1; height:6px; border-radius:3px; overflow:hidden; }
.t-mini-fill  { height:100%; border-radius:3px; }

.flag-badge  { display:flex; align-items:center; gap:5px; background:#FEF2F2; border:1.5px solid #FCA5A5; border-radius:20px; padding:3px 9px; font-size:11px; font-weight:800; color:#DC2626; }
.quest-tag   { display:flex; align-items:center; gap:5px; background:#F5F0FF; border:1.5px solid var(--purple-light); border-radius:20px; padding:3px 9px; font-size:11px; font-weight:700; color:var(--purple-dark); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:100%; }

/* Teacher student editor */
.t-edit-screen { padding:14px 14px 40px; align-items:stretch; }
.t-edit-wrap   { width:100%; max-width:700px; margin:0 auto; display:flex; flex-direction:column; gap:14px; }
.t-edit-hdr    { display:flex; align-items:center; gap:14px; padding:2px 0 6px; }

.t-section { background:rgba(255,255,255,.97); border:3px solid var(--gold); border-radius:var(--card-radius); padding:18px 20px 20px; }
.t-section-title { font-family:var(--font-display); font-size:14px; font-weight:700; color:var(--purple-dark); margin-bottom:14px; padding-bottom:10px; border-bottom:2px dashed var(--purple-light); }

/* Stat editor rows */
.t-stat-row { display:flex; align-items:center; gap:10px; margin-bottom:10px; }
.t-stat-row:last-of-type { margin-bottom:0; }
.t-stat-icon { font-size:17px; flex-shrink:0; }
.t-stat-lbl  { width:28px; font-size:13px; font-weight:900; color:var(--text-dark); flex-shrink:0; }
.t-stat-ctrl { display:flex; align-items:center; gap:0; background:#F5F0FF; border:2px solid var(--purple-light); border-radius:12px; overflow:hidden; flex-shrink:0; }
.stat-adj    { width:32px; height:32px; font-size:18px; font-weight:900; color:var(--purple); display:flex; align-items:center; justify-content:center; transition:background .15s; border:none; background:none; cursor:pointer; }
.stat-adj:hover { background:#EDE8FF; }
.stat-adj:disabled { color:var(--purple-light); cursor:not-allowed; }
.stat-num    { width:28px; text-align:center; font-size:15px; font-weight:900; color:var(--purple-dark); }
.t-stat-mini { flex:1; height:12px; border-radius:6px; overflow:hidden; }
.t-stat-mini-fill { height:100%; border-radius:6px; transition:width .3s; }
.t-stat-max  { font-size:12px; font-weight:700; color:var(--text-light); flex-shrink:0; }

/* XP row */
.t-xp-row { display:flex; align-items:center; gap:10px; }
.t-xp-inp { width:90px; background:#F5F0FF; border:2px solid var(--purple-light); border-radius:10px; padding:7px 10px; font-size:14px; font-weight:700; color:var(--purple-dark); outline:none; text-align:center; }
.t-xp-inp:focus { border-color:var(--purple); }
.t-xp-sep { color:var(--text-light); font-weight:700; }

/* Chips */
.chip-row  { display:flex; flex-wrap:wrap; gap:7px; margin-bottom:10px; min-height:28px; }
.inv-chip  { display:inline-flex; align-items:center; gap:5px; background:#F5F0FF; border:2px solid var(--purple-light); border-radius:20px; padding:5px 10px 5px 8px; font-size:12px; font-weight:700; color:var(--purple-dark); }
.boss-chip { display:inline-flex; align-items:center; gap:5px; background:#FEF3C7; border:2px solid var(--gold-light); border-radius:20px; padding:5px 10px 5px 8px; font-size:12px; font-weight:700; color:var(--gold-dark); }
.chip-x    { width:16px; height:16px; border-radius:50%; background:rgba(0,0,0,.12); display:flex; align-items:center; justify-content:center; font-size:11px; cursor:pointer; border:none; color:inherit; flex-shrink:0; transition:background .15s; }
.chip-x:hover { background:rgba(0,0,0,.22); }
.t-add-sel { background:#F5F0FF; border:2px solid var(--purple-light); border-radius:12px; padding:7px 12px; font-size:13px; font-weight:700; color:var(--purple-dark); outline:none; cursor:pointer; font-family:var(--font-body); }
.t-add-sel:focus { border-color:var(--purple); }
.t-add-boss-sel { background:#FEF3C7; border:2px solid var(--gold-light); border-radius:12px; padding:7px 12px; font-size:13px; font-weight:700; color:var(--gold-dark); outline:none; cursor:pointer; font-family:var(--font-body); }

/* Quest input */

/* Help flag display */
.t-flag-row { display:flex; align-items:center; gap:12px; background:#FEF2F2; border:2px solid #FCA5A5; border-radius:14px; padding:12px 16px; }
.t-flag-time { flex:1; font-size:13px; font-weight:700; color:#DC2626; }
.t-no-flag   { font-size:13px; font-weight:700; color:var(--text-light); font-style:italic; }
.btn-clear-flag { background:white; border:2px solid #FCA5A5; border-radius:10px; padding:7px 14px; font-size:13px; font-weight:800; color:#DC2626; cursor:pointer; transition:background .15s; }
.btn-clear-flag:hover { background:#FEF2F2; }

/* Task progress panel */
.tp-tile-card { background:#F9F7FF; border:1.5px solid #C4B5FD; border-radius:10px; padding:12px 14px; margin-bottom:8px; }
.tp-tile-card:last-child { margin-bottom:0; }
.tp-tile-name { font-size:13px; font-weight:900; color:var(--purple-dark); margin-bottom:8px; }
/* ── NPC Modal ── */
.npc-overlay { position:fixed; inset:0; background:rgba(0,0,0,.72); z-index:9000; display:flex; align-items:center; justify-content:center; animation:fadeIn .18s ease; }
.npc-modal { position:relative; background:linear-gradient(160deg,#1a1235 0%,#0f0a22 100%); border-radius:22px; padding:32px 28px 28px; width:min(440px,90vw); box-shadow:0 24px 80px rgba(0,0,0,.7),0 0 0 1.5px rgba(255,255,255,.08); animation:slideUp .2s ease; }
.npc-modal-close { position:absolute; top:14px; right:16px; background:rgba(255,255,255,.08); border:none; color:rgba(255,255,255,.6); font-size:18px; width:34px; height:34px; border-radius:50%; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:background .15s; }
.npc-modal-close:hover { background:rgba(255,255,255,.18); color:#fff; }
.npc-modal-portrait { width:250px; height:250px; border-radius:16px; object-fit:cover; object-position:top center; border:3px solid; display:block; margin:0 auto 14px; }
.npc-modal-name { font-family:var(--font-display); font-size:20px; font-weight:900; color:#fff; text-align:center; margin-bottom:6px; }
.npc-type-badge { display:inline-block; font-size:10px; font-weight:900; letter-spacing:1.5px; padding:3px 10px; border-radius:20px; margin:0 auto 16px; }
.npc-modal-dialogue { font-size:15px; color:rgba(255,255,255,.82); line-height:1.65; text-align:center; font-style:italic; }
.npc-modal-footer { margin-top:20px; text-align:center; }
.npc-modal-footer button { background:rgba(255,255,255,.1); border:1.5px solid rgba(255,255,255,.15); color:rgba(255,255,255,.7); font-size:13px; font-weight:700; padding:9px 24px; border-radius:20px; cursor:pointer; transition:background .15s; }
.npc-modal-footer button:hover { background:rgba(255,255,255,.18); color:#fff; }
/* ── Land 0 / Starting Grounds modal ── */
.sg-modal { position:relative; background:rgba(255,255,255,.93); border:1.5px solid #C4B5FD; border-radius:18px; padding:32px 28px 24px; width:min(520px,92vw); max-height:82vh; overflow-y:auto; box-shadow:0 8px 32px rgba(0,0,0,.18); animation:slideUp .2s ease; }
.sg-modal .npc-modal-close { background:rgba(0,0,0,.07); color:rgba(0,0,0,.45); }
.sg-modal .npc-modal-close:hover { background:rgba(0,0,0,.13); color:rgba(0,0,0,.8); }
.sg-modal-icon { font-size:36px; text-align:center; margin-bottom:10px; }
.sg-modal-title { font-family:var(--font-display); font-size:20px; font-weight:900; color:#1a0a2e; text-align:center; margin-bottom:14px; }
.sg-modal-flavor { font-style:italic; color:rgba(0,0,0,.6); font-size:13.5px; line-height:1.65; margin-bottom:20px; border-left:3px solid #7C3AED; padding-left:12px; }
.sg-modal-footer { text-align:center; margin-top:18px; display:flex; gap:10px; justify-content:center; flex-wrap:wrap; }
.sg-gate-banner { text-align:center; font-size:14px; color:#5B21B6; line-height:1.65; padding:16px; background:rgba(124,58,237,.08); border-radius:12px; border:1px solid rgba(124,58,237,.2); margin-bottom:4px; }
.sg-modal-avatar-hint { font-size:13px; color:rgba(0,0,0,.55); background:rgba(0,0,0,.04); border-radius:10px; padding:12px 14px; text-align:center; line-height:1.6; }
/* Lesson demo inside sg modal */
.sg-lesson-demo { display:flex; flex-direction:column; gap:12px; }
.sg-lesson-section { background:rgba(0,0,0,.05); border-radius:10px; padding:12px 14px; }
.sg-lesson-label { font-size:10px; font-weight:900; color:rgba(0,0,0,.45); letter-spacing:1.2px; text-transform:uppercase; margin-bottom:8px; }
.sg-video-ph { border-radius:10px; background:rgba(0,0,0,.07); padding:22px; text-align:center; color:rgba(0,0,0,.38); font-size:13px; }
.sg-check-item { display:flex; align-items:center; gap:8px; font-size:13px; color:rgba(0,0,0,.65); padding:4px 0; cursor:pointer; }
.sg-check-item input { accent-color:#7C3AED; width:15px; height:15px; flex-shrink:0; }
/* Land 0 world-map dot */
.lm-dot.sg-done { border-color:#D97706; background:rgba(217,119,6,.2); }
.lm-dot.sg-here { border-color:#F59E0B; background:rgba(245,158,11,.28); box-shadow:0 0 8px #F59E0B66; }
.tp-rush-flag { cursor:help; font-size:13px; margin-left:6px; vertical-align:middle; }
.tp-time-note { font-size:11px; color:#92400E; background:#FEF3C7; border:1px solid #FCD34D; border-radius:6px; padding:3px 8px; margin-bottom:8px; display:inline-block; }
.tp-land-name { color:var(--text-light); font-weight:600; font-size:11px; }
.tp-tier { margin-bottom:8px; }
.tp-tier:last-child { margin-bottom:0; }
.tp-tier-hdr { font-size:11px; font-weight:800; color:var(--text-light); text-transform:uppercase; letter-spacing:.5px; margin-bottom:5px; display:flex; align-items:center; gap:5px; }
.tp-tier-count { background:var(--purple-light); color:white; border-radius:20px; padding:1px 7px; font-size:10px; font-weight:900; }
.tp-tier-count.all-done { background:#10B981; }
.tp-task-row { display:flex; align-items:flex-start; gap:7px; font-size:12px; color:var(--text-dark); margin-bottom:4px; line-height:1.35; }
.tp-task-text { font-weight:600; }
.tp-task-text.tp-done { color:var(--text-light); text-decoration:line-through; }
.tp-empty { font-size:13px; color:var(--text-light); font-style:italic; }
.tp-status { font-size:10px; font-weight:800; border-radius:20px; padding:2px 8px; margin-left:6px; vertical-align:middle; }
.tp-status-current { background:#EDE9FE; color:#6D28D9; }
.tp-status-done    { background:#D1FAE5; color:#065F46; }
.tp-no-data { font-size:11px; color:var(--text-light); font-style:italic; margin-bottom:6px; }

/* ── Companions ── */
/* Companion slot card on hub */
.companion-card-slot { width:80px; height:80px; flex-shrink:0; background:white; border:1.5px solid rgba(245,200,66,.35); border-radius:10px; box-shadow:0 0 0 2px rgba(245,200,66,.1); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:4px; padding:6px 4px; }
.companion-card-slot img { width:80%; aspect-ratio:1; object-fit:contain; display:block; }
.companion-card-name { font-size:9px; font-weight:700; color:var(--text-light); text-align:center; line-height:1.2; }
.companion-card-empty { border:1.5px dashed #D1D5DB; background:transparent; box-shadow:none; }
.companion-card-empty-icon { font-size:22px; opacity:.25; }

/* Customize tabs */
.cust-tabs { display:flex; border-bottom:1px solid rgba(255,255,255,.1); flex-shrink:0; }
.cust-tab { flex:1; padding:11px 6px; background:none; border:none; border-bottom:2.5px solid transparent; color:rgba(255,255,255,.4); font-size:11px; font-weight:800; letter-spacing:.4px; cursor:pointer; transition:color .15s,border-color .15s; font-family:var(--font-body); }
.cust-tab.active { color:white; border-bottom-color:var(--gold); }

/* Companion grid in customize */
.companion-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; }
.companion-slot { border-radius:12px; padding:8px 4px 6px; display:flex; flex-direction:column; align-items:center; gap:4px; cursor:pointer; transition:transform .15s; border:2px solid transparent; }
.companion-slot.earned:hover { transform:scale(1.06); }
.companion-slot.earned.c-active { outline:3px solid var(--gold); outline-offset:2px; }
.companion-slot.locked { opacity:.28; filter:grayscale(1); cursor:default; pointer-events:none; }
.companion-slot img { width:58px; height:58px; object-fit:contain; }
.companion-slot .c-name { font-size:9px; font-weight:700; color:rgba(255,255,255,.7); text-align:center; line-height:1.2; }
.companion-slot .c-rarity { font-size:8px; font-weight:800; letter-spacing:.5px; }

/* Teacher companion picker */
.cpicker-overlay { position:fixed; inset:0; z-index:960; display:flex; align-items:center; justify-content:center; background:rgba(0,0,0,.6); backdrop-filter:blur(3px); }
.cpicker-modal { background:white; border:1.5px solid #C4B5FD; border-radius:16px; padding:20px; width:min(96vw,520px); max-height:85vh; display:flex; flex-direction:column; gap:14px; box-shadow:0 20px 60px rgba(0,0,0,.3); }
.cpicker-hdr { display:flex; align-items:center; justify-content:space-between; }
.cpicker-title { font-family:var(--font-display); font-size:16px; font-weight:900; color:var(--purple-dark); }
.cpicker-grid { display:grid; grid-template-columns:repeat(6,1fr); gap:8px; overflow-y:auto; max-height:55vh; padding:2px; }
.cpicker-item { display:flex; flex-direction:column; align-items:center; gap:3px; padding:6px 4px; border-radius:10px; border:2px solid transparent; cursor:pointer; transition:background .12s,transform .12s; }
.cpicker-item:hover { background:#F5F0FF; transform:scale(1.08); }
.cpicker-item img { width:46px; height:46px; object-fit:contain; }
.cpicker-item .cp-name { font-size:8px; font-weight:700; color:#6B7280; text-align:center; line-height:1.2; }
.cpicker-item .cp-rarity { font-size:7px; font-weight:800; }
.cpicker-award-btn { width:28px; height:28px; border-radius:50%; border:none; background:none; font-size:18px; cursor:pointer; color:var(--text-light); display:flex; align-items:center; justify-content:center; transition:background .12s; }
.cpicker-award-btn:hover { background:#F5F0FF; }

/* Companion reveal overlay */
.companion-reveal-overlay { position:fixed; inset:0; z-index:1000; display:flex; align-items:center; justify-content:center; background:rgba(0,0,0,.75); backdrop-filter:blur(6px); animation:fadeIn .25s ease; }
.companion-reveal-card { background:linear-gradient(155deg,#1E1B4B,#0F172A); border:1.5px solid rgba(124,58,237,.5); border-radius:20px; padding:32px 28px 24px; display:flex; flex-direction:column; align-items:center; gap:12px; box-shadow:0 28px 80px rgba(0,0,0,.7); animation:popIn .35s cubic-bezier(.34,1.56,.64,1); }
@keyframes popIn { from{transform:scale(.5);opacity:0} to{transform:scale(1);opacity:1} }
.companion-reveal-label { font-size:12px; font-weight:900; color:rgba(180,160,255,.7); letter-spacing:1px; text-transform:uppercase; }
.companion-reveal-img-wrap { width:120px; height:120px; border-radius:50%; border:4px solid; display:flex; align-items:center; justify-content:center; background:rgba(255,255,255,.07); }
.companion-reveal-img-wrap img { width:88px; height:88px; object-fit:contain; animation:float 2s ease-in-out infinite; }
@keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }
.companion-reveal-name { font-family:var(--font-display); font-size:24px; font-weight:900; color:white; }
.companion-reveal-rarity { font-size:12px; font-weight:800; letter-spacing:.8px; text-transform:uppercase; }
.companion-reveal-btn { margin-top:6px; padding:12px 36px; border-radius:12px; border:none; background:var(--gold); color:#1a0a00; font-size:14px; font-weight:900; cursor:pointer; font-family:var(--font-display); transition:transform .12s; }
.companion-reveal-btn:hover { transform:scale(1.04); }

/* Boss defeat button */
.boss-defeat-btn { width:100%; padding:16px 20px; border-radius:14px; border:2px solid #10B981; background:linear-gradient(135deg,#059669,#047857); color:white; font-family:var(--font-display); font-size:15px; font-weight:900; cursor:pointer; transition:transform .12s,box-shadow .12s; box-shadow:0 4px 18px rgba(5,150,105,.3); letter-spacing:.3px; }
.boss-defeat-btn:hover { transform:translateY(-2px); box-shadow:0 8px 28px rgba(5,150,105,.4); }

/* Award companion button in teacher card */
.t-award-companion-btn { display:flex; align-items:center; gap:5px; background:#F5F0FF; border:1.5px solid #C4B5FD; border-radius:8px; padding:5px 10px; font-size:11px; font-weight:800; color:var(--purple-dark); cursor:pointer; transition:background .12s; width:100%; justify-content:center; margin-top:6px; }
.t-award-companion-btn:hover { background:#EDE9FE; }

/* Save button */
.btn-save { background:linear-gradient(135deg,#10B981,#059669); color:white; border-color:#047857; box-shadow:0 4px 16px rgba(16,185,129,.35); padding:16px 40px; font-size:17px; border-radius:18px; width:100%; }
.btn-danger-zone { width:100%; padding:13px; border-radius:14px; border:2px solid #991B1B; background:rgba(127,29,29,.08); color:#991B1B; font-size:14px; font-weight:700; cursor:pointer; letter-spacing:.3px; transition:background .15s,box-shadow .15s; font-family:var(--font-display); }
.btn-danger-zone:hover { background:rgba(127,29,29,.15); box-shadow:0 0 0 3px rgba(153,27,27,.18); }
/* Reset confirmation modal */
.reset-confirm-overlay { position:fixed; inset:0; background:rgba(0,0,0,.6); z-index:9000; display:flex; align-items:center; justify-content:center; padding:20px; }
.reset-confirm-modal { background:#fff; border-radius:20px; padding:32px 28px 24px; width:min(480px,94vw); border:3px solid #991B1B; box-shadow:0 16px 48px rgba(0,0,0,.35); animation:slideUp .2s ease; }
.reset-confirm-icon { font-size:48px; text-align:center; margin-bottom:8px; }
.reset-confirm-title { font-family:var(--font-display); font-size:20px; font-weight:900; color:#7F1D1D; text-align:center; margin-bottom:6px; }
.reset-confirm-name { text-align:center; font-size:15px; color:#374151; font-weight:700; margin-bottom:16px; }
.reset-confirm-list { background:#FEF2F2; border:1.5px solid #FECACA; border-radius:12px; padding:14px 16px; margin-bottom:20px; }
.reset-confirm-list li { font-size:13px; color:#7F1D1D; line-height:1.8; }
.reset-confirm-note { font-size:12px; color:#6B7280; text-align:center; margin-bottom:20px; font-style:italic; }
.reset-confirm-btns { display:flex; gap:10px; }
.reset-cancel-btn { flex:1; padding:13px; border-radius:12px; border:2px solid #D1D5DB; background:#fff; color:#374151; font-size:14px; font-weight:700; cursor:pointer; transition:background .12s; font-family:var(--font-display); }
.reset-cancel-btn:hover { background:#F3F4F6; }
.reset-confirm-btn { flex:1; padding:13px; border-radius:12px; border:none; background:linear-gradient(135deg,#B91C1C,#DC2626); color:#fff; font-size:14px; font-weight:900; cursor:pointer; letter-spacing:.3px; transition:opacity .12s,transform .1s; font-family:var(--font-display); }
.reset-confirm-btn:hover { opacity:.9; transform:translateY(-1px); }
/* Guild reveal overlay */
@keyframes guild-crest-pulse { 0%,100%{opacity:.22;transform:scale(.88)} 50%{opacity:.45;transform:scale(.97)} }
@keyframes guild-chosen-pop  { 0%{opacity:0;transform:scale(.5)} 75%{transform:scale(1.08)} 100%{opacity:1;transform:scale(1)} }
@keyframes guild-glow-beat   { 0%,100%{filter:drop-shadow(0 0 10px var(--gc,#FFF)) drop-shadow(0 0 20px var(--gc,#FFF))} 50%{filter:drop-shadow(0 0 28px var(--gc,#FFF)) drop-shadow(0 0 72px var(--gc,#FFF))} }
@keyframes guild-text-rise   { 0%{opacity:0;transform:translateY(18px)} 100%{opacity:1;transform:translateY(0)} }
@keyframes guild-color-flash { 0%{opacity:0} 20%{opacity:.3} 100%{opacity:0} }
.guild-reveal-overlay { position:fixed; inset:0; z-index:8500; background:rgba(3,5,26,.97); display:flex; align-items:center; justify-content:center; padding:24px; }
.guild-color-flash { position:fixed; inset:0; pointer-events:none; z-index:8600; animation:guild-color-flash 1.8s .4s ease forwards; }
.guild-reveal-inner { position:relative; z-index:8700; max-width:560px; width:100%; text-align:center; display:flex; flex-direction:column; align-items:center; gap:0; }
.guild-spin-title { font-family:var(--font-display); font-size:clamp(14px,3vw,20px); font-weight:700; color:rgba(253,230,138,.6); letter-spacing:4px; margin-bottom:32px; }
.guild-crest-grid { display:grid; grid-template-columns:1fr 1fr; gap:28px; margin:0 auto 28px; width:fit-content; }
.guild-crest-dim { width:80px; height:80px; object-fit:contain; animation:guild-crest-pulse 1.8s ease-in-out infinite; display:block; }
.guild-crest-dim:nth-child(2) { animation-delay:.45s; }
.guild-crest-dim:nth-child(3) { animation-delay:.9s; }
.guild-crest-dim:nth-child(4) { animation-delay:1.35s; }
.guild-spin-hint { font-size:13px; color:rgba(255,255,255,.3); font-style:italic; }
/* Chosen state */
.guild-chosen-crest { display:block; width:clamp(110px,28vw,170px); height:clamp(110px,28vw,170px); object-fit:contain; margin:0 auto 20px; animation:guild-chosen-pop .7s cubic-bezier(.175,.885,.32,1.275) both, guild-glow-beat 2.2s 1s ease-in-out infinite; }
.guild-chosen-eyebrow { font-family:var(--font-display); font-size:clamp(11px,2vw,14px); font-weight:700; color:rgba(255,255,255,.55); letter-spacing:3px; animation:guild-text-rise .5s .15s ease both; margin-bottom:8px; }
.guild-chosen-name { font-family:var(--font-display); font-size:clamp(28px,7vw,52px); font-weight:900; letter-spacing:4px; animation:guild-text-rise .5s .35s ease both; line-height:1.05; margin-bottom:10px; }
.guild-chosen-motto { font-size:clamp(14px,3vw,18px); font-style:italic; color:rgba(255,255,255,.65); animation:guild-text-rise .5s .55s ease both; margin-bottom:28px; }
.guild-continue-btn { font-family:var(--font-display); font-size:15px; font-weight:900; letter-spacing:1.5px; padding:14px 42px; border-radius:16px; border:none; cursor:pointer; animation:guild-text-rise .5s .75s ease both; transition:opacity .15s,transform .1s; }
.guild-continue-btn:hover { opacity:.88; transform:translateY(-2px); }
/* Hub guild panel */
.hub-guild-panel { display:flex; align-items:center; gap:14px; padding:14px 18px; border-radius:16px; background:rgba(255,255,255,.06); border:2px solid; backdrop-filter:blur(4px); }
.hub-guild-crest { width:52px; height:52px; object-fit:contain; flex-shrink:0; }
.hub-guild-badge { position:absolute; bottom:-4px; right:-4px; width:36px; height:36px; object-fit:contain; border-radius:50%; border:2px solid rgba(255,255,255,.3); background:rgba(3,5,26,.8); padding:2px; }
.hub-guild-name { font-family:var(--font-display); font-size:16px; font-weight:900; letter-spacing:.5px; }
.hub-guild-motto { font-size:12px; font-style:italic; color:rgba(255,255,255,.55); margin-top:2px; }
/* Teacher guild roster */
.t-guild-roster { display:flex; flex-wrap:wrap; gap:10px; }
.t-guild-chip { display:flex; align-items:center; gap:8px; padding:10px 14px; border-radius:12px; background:rgba(255,255,255,.06); border:1.5px solid; flex:1; min-width:140px; }
.t-guild-chip-crest { width:28px; height:28px; object-fit:contain; }
.t-guild-chip-name { font-family:var(--font-display); font-size:13px; font-weight:800; }
.t-guild-chip-count { font-size:20px; font-weight:900; font-family:var(--font-display); line-height:1; }
.t-guild-members { font-size:11px; color:rgba(255,255,255,.45); margin-top:2px; line-height:1.5; }
/* sg modal guild info card */
/* Armory tile modal */
.sg-armory-title { font-family:var(--font-display); font-size:21px; font-weight:900; color:#1a0a2e; letter-spacing:2px; text-align:center; margin-bottom:5px; }
.sg-armory-subtitle { font-size:13px; color:rgba(0,0,0,.55); font-style:italic; line-height:1.6; text-align:center; }
.sg-armory-divider { height:2px; background:linear-gradient(90deg,transparent,#F59E0B88,#F59E0B,#F59E0B88,transparent); border:none; margin:14px 0 16px; }
.sg-stat-grid { display:grid; grid-template-columns:1fr 1fr; gap:9px; margin-bottom:16px; }
@media(max-width:420px) { .sg-stat-grid { grid-template-columns:1fr; } }
.sg-stat-card { border:2px solid; border-radius:11px; padding:11px 13px; background:rgba(255,255,255,.55); }
.sg-stat-card-hdr { font-size:14px; font-weight:800; margin-bottom:5px; line-height:1.3; }
.sg-stat-card-desc { font-size:11.5px; color:rgba(0,0,0,.6); line-height:1.55; }
.sg-armory-tbl-lbl { font-family:var(--font-display); font-size:11px; font-weight:800; color:#1a0a2e; letter-spacing:2px; margin-bottom:7px; }
.sg-armory-table { width:100%; border-collapse:collapse; font-size:12.5px; margin-bottom:14px; border-radius:10px; overflow:hidden; }
.sg-armory-table th { background:#EDE9FE; color:#4B1D8A; font-family:var(--font-display); font-size:11px; letter-spacing:.5px; padding:7px 11px; text-align:left; }
.sg-armory-table td { padding:7px 11px; }
.sg-armory-table tbody tr:nth-child(odd) td { background:#fff; }
.sg-armory-table tbody tr:nth-child(even) td { background:#F8F9FA; }
.sg-armory-footer-note { font-size:12.5px; font-weight:700; color:#1a0a2e; text-align:center; margin-bottom:4px; }
.sg-guild-card { display:flex; flex-direction:column; align-items:center; gap:10px; padding:20px; border-radius:16px; border:2px solid; background:rgba(255,255,255,.6); margin-top:4px; }
.sg-guild-card-crest { width:72px; height:72px; object-fit:contain; }
.sg-guild-card-name { font-family:var(--font-display); font-size:18px; font-weight:900; }
.sg-guild-card-motto { font-size:13px; font-style:italic; color:rgba(0,0,0,.55); text-align:center; }

@media(max-width:600px) {
  .t-student-grid { grid-template-columns:repeat(2,1fr); }
  .period-tabs { flex-wrap:wrap; }
}

/* ════ QUEST MAP ════ */
/* Land Map */
.land-map-screen { padding:0; align-items:stretch !important; background:#0D0620; height:100vh; overflow:hidden; }
.lm-header { display:flex; align-items:center; justify-content:space-between; padding:8px 16px; flex-shrink:0; gap:10px; }
.lm-title  { font-family:var(--font-display); font-size:14px; font-weight:900; color:white; text-shadow:0 2px 8px rgba(0,0,0,.8); white-space:nowrap; }
.lm-lands  { display:flex; gap:5px; align-items:center; flex:1; justify-content:center; }
.lm-dot { width:26px; height:26px; border-radius:6px; border:2px solid rgba(255,255,255,.15); display:flex; align-items:center; justify-content:center; font-size:12px; transition:border-color .2s,background .2s; }
.lm-dot.done  { border-color:#F59E0B; background:rgba(245,158,11,.18); }
.lm-dot.here  { border-color:#7C3AED; background:rgba(124,58,237,.28); box-shadow:0 0 8px #7C3AED66; }
.lm-dot.locked{ opacity:.3; }
.lm-svg-wrap { flex:1; min-height:0; display:flex; align-items:center; justify-content:center; overflow:hidden; padding:0 8px 8px; position:relative; }
.lm-map-bg { position:absolute; inset:0; background-image:url('/tiles/map_background.png'); background-size:cover; background-position:center; opacity:0.4; pointer-events:none; }
.lm-svg-wrap svg { position:relative; z-index:1; }

@keyframes qmPulseRing { 0%{opacity:.65;transform:scale(1)} 100%{opacity:0;transform:scale(1.9)} }
@keyframes qmBobble    { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-5px)} }
@keyframes lmTravel    { 0%{opacity:1} 40%{opacity:0} 60%{opacity:0} 100%{opacity:1} }
.qm-pr { animation:qmPulseRing 2s ease-out infinite; transform-box:fill-box; transform-origin:50% 50%; }
.qm-yh { animation:qmBobble 2.2s ease-in-out infinite; transform-box:fill-box; transform-origin:50% 50%; }

/* Board view */
.board-screen { padding:0 12px 0; overflow:hidden; height:100vh; display:flex; flex-direction:column; background:#0D0620; align-items:stretch; }
.board-header { display:flex; align-items:center; justify-content:space-between; padding:10px 4px 8px; flex-shrink:0; }
.board-title  { font-family:var(--font-display); font-size:18px; font-weight:900; color:white; text-shadow:0 1px 5px rgba(0,0,0,.5); }
.board-map-wrap { flex:1; min-height:0; overflow:hidden; display:flex; align-items:center; justify-content:center; }

/* ── Help flag modal ── */
.help-modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.6); z-index:200; display:flex; align-items:center; justify-content:center; padding:16px; }
.help-modal { background:#1E1B4B; border:2px solid #7C3AED; border-radius:16px; padding:24px 20px 20px; width:100%; max-width:360px; display:flex; flex-direction:column; gap:14px; }
.help-modal-title { font-family:var(--font-display); font-size:20px; font-weight:900; color:#EDE9FE; text-align:center; }
.help-modal-sub { color:#C4B5FD; font-size:14px; text-align:center; margin:0; }
.help-modal-input { background:#2D2464; border:1.5px solid #7C3AED; border-radius:10px; color:#EDE9FE; font-size:14px; padding:10px 12px; resize:none; outline:none; font-family:inherit; }
.help-modal-input::placeholder { color:#7C6FA8; }
.help-modal-btns { display:flex; gap:10px; justify-content:flex-end; }
/* Flag message on teacher dashboard card */
.flag-msg { display:block; font-size:11px; font-style:italic; color:#FCA5A5; margin-top:3px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:180px; }
/* Flag message in teacher edit panel */
.t-flag-msg { font-size:13px; font-style:italic; color:#FCA5A5; margin-top:4px; }
